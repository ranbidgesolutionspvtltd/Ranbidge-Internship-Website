services:
  # Web Service
  - type: web
    name: ranbidge-internship-website
    env: static
    buildCommand: cd "Ranbidge Intern Website" && npm install && npm run build
    staticPublishPath: "Ranbidge Intern Website/dist"
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
    domains:
      - ranbidge.onrender.com
      - ranbidge-solutions.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: "no-referrer-when-downgrade"
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self' http: https: data: blob: 'unsafe-inline'"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
